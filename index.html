<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0e0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Add Task</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f2ed;
      --surface:  #ede9e2;
      --border:   #c8c2b8;
      --text:     #000000;
      --muted:    #6b6558;
      --accent:   #8b5e2a;
      --success:  #3a7a52;
      --danger:   #a03030;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Spectral', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) 2rem env(safe-area-inset-bottom, 20px);
      gap: 0;
    }

    /* ── Auth screen ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      text-align: center;
      animation: fadeIn 0.6s ease both;
    }

    .wordmark {
      font-family: 'Spectral', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .auth-headline {
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      max-width: 280px;
    }

    .auth-headline em {
      font-style: italic;
      color: var(--accent);
    }

    .auth-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 0.85rem 1.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .auth-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main app screen ── */
    #app-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      gap: 0;
      animation: fadeIn 0.4s ease both;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding-bottom: 3rem;
    }

    .top-wordmark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .list-selector {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      padding: 0.3rem 0;
      appearance: none;
      -webkit-appearance: none;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-selector:focus { outline: none; color: var(--text); }
    .list-selector option { background: var(--surface); color: var(--text); }

    /* ── Input area ── */
    .input-wrap {
      width: 100%;
      position: relative;
    }

    #task-input {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'Spectral', serif;
      font-size: 1.7rem;
      font-weight: 600;
      line-height: 1.5;
      padding: 0 0 1rem 0;
      resize: none;
      outline: none;
      min-height: 2.5rem;
      caret-color: var(--accent);
      transition: border-color 0.2s;
    }
    #task-input::placeholder { color: var(--muted); font-style: italic; }
    #task-input:focus { border-color: var(--accent); }

    /* ── Date row ── */
    .date-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-top: 1.2rem;
      width: 100%;
    }

    .date-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    #due-date {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      outline: none;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
      flex: 1;
    }
    #due-date:focus { color: var(--text); }
    #due-date::-webkit-calendar-picker-indicator { filter: invert(0.5); }

    /* ── Send button ── */
    .send-wrap {
      padding-top: 3rem;
      width: 100%;
      display: flex;
      justify-content: flex-end;
    }

    #send-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    #send-btn:not(:disabled):hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    #send-btn:disabled { opacity: 0.3; cursor: default; }
    #send-btn.loading { color: transparent; }
    #send-btn.loading::after {
      content: '';
      position: absolute;
      inset: 50% 50%;
      width: 14px;
      height: 14px;
      margin: -7px 0 0 -7px;
      border: 1px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 2rem);
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.7rem 1.4rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.ok  { color: var(--success); border-color: var(--success); }
    #toast.err { color: var(--danger);  border-color: var(--danger);  }

    /* ── Config screen ── */
    #config-screen {
      display: none;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.3s ease both;
    }

    .config-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .config-field { display: flex; flex-direction: column; gap: 0.5rem; }

    .config-field label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .config-field input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.7rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .config-field input:focus { border-color: var(--accent); }

    .config-actions { display: flex; gap: 1rem; padding-top: 0.5rem; }

    .config-btn {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .config-btn:hover { border-color: var(--accent); color: var(--accent); }
    .config-btn.primary { border-color: var(--accent); color: var(--accent); }

    .config-note {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      line-height: 1.6;
    }
    .config-note a { color: var(--accent); text-decoration: none; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Auth / first-run screen -->
<div id="auth-screen">
  <span class="wordmark">Task</span>
  <h1 class="auth-headline">One thought,<br /><em>one place.</em></h1>
  <button class="auth-btn" id="setup-btn">↗ Connect Google Tasks</button>
</div>

<!-- Config screen (enter client ID) -->
<div id="config-screen">
  <div class="config-title">Setup · Google OAuth</div>

  <p class="config-note">
    You need a Google OAuth Client ID.<br />
    <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">
      console.cloud.google.com → APIs → Credentials
    </a><br /><br />
    Create a Web Application credential.<br />
    Add this page's URL as an Authorised Redirect URI.
  </p>

  <div class="config-field">
    <label>Client ID</label>
    <input type="text" id="client-id-input" placeholder="xxxxx.apps.googleusercontent.com" autocomplete="off" spellcheck="false" />
  </div>

  <div class="config-field">
    <label>Client Secret</label>
    <input type="text" id="client-secret-input" placeholder="GOCSPX-…" autocomplete="off" spellcheck="false" />
  </div>

  <div class="config-actions">
    <button class="config-btn" id="config-cancel-btn">Cancel</button>
    <button class="config-btn primary" id="config-save-btn">Connect →</button>
  </div>
</div>

<!-- Main app -->
<div id="app-screen">
  <div class="top-bar">
    <span class="top-wordmark">Task</span>
    <select class="list-selector" id="list-selector" title="Task list">
      <option value="">loading lists…</option>
    </select>
  </div>

  <div class="input-wrap">
    <textarea
      id="task-input"
      rows="1"
      placeholder="what needs doing…"
      autocomplete="off"
      spellcheck="false"
      autofocus
      inputmode="text"
      enterkeyhint="send"
    ></textarea>
  </div>

  <div class="date-row">
    <span class="date-label">Due</span>
    <input type="date" id="due-date" />
  </div>

  <div class="send-wrap">
    <button id="send-btn" disabled>Add →</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const SCOPE      = 'https://www.googleapis.com/auth/tasks';
const TOKEN_URL  = 'https://oauth2.googleapis.com/token';
const TASKS_BASE = 'https://tasks.googleapis.com/tasks/v1';

// ─────────────────────────────────────────────
// STORAGE HELPERS
// ─────────────────────────────────────────────
const store = {
  get: k => localStorage.getItem(k),
  set: (k, v) => localStorage.setItem(k, v),
  del: k => localStorage.removeItem(k),
};

function getClientId()     { return store.get('clientId'); }
function getClientSecret() { return store.get('clientSecret'); }
function getRefreshToken() { return store.get('refreshToken'); }
function getAccessToken()  { return store.get('accessToken'); }
function getTokenExpiry()  { return parseInt(store.get('tokenExpiry') || '0'); }
function getListId()       { return store.get('listId') || '@default'; }
function saveListId(id)    { store.set('listId', id); }

// ─────────────────────────────────────────────
// PKCE HELPERS
// ─────────────────────────────────────────────
function randomBase64(len) {
  const arr = crypto.getRandomValues(new Uint8Array(len));
  return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function sha256base64url(plain) {
  const enc = new TextEncoder().encode(plain);
  const digest = await crypto.subtle.digest('SHA-256', enc);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

// ─────────────────────────────────────────────
// AUTH FLOW
// ─────────────────────────────────────────────
async function startAuth(clientId, clientSecret) {
  store.set('clientId', clientId);
  store.set('clientSecret', clientSecret);
  const verifier  = randomBase64(64);
  const challenge = await sha256base64url(verifier);
  store.set('pkce_verifier', verifier);
  store.set('pkce_redirect', 'https://robinberkelmans-byte.github.io/Mudita-Tasks/');

  const params = new URLSearchParams({
    client_id:             clientId,
    redirect_uri:          location.href.split('?')[0],
    response_type:         'code',
    scope:                 SCOPE,
    code_challenge:        challenge,
    code_challenge_method: 'S256',
    access_type:           'offline',
    prompt:                'consent',
  });

  location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
}

async function handleAuthCallback(code) {
  const clientId     = getClientId();
  const clientSecret = getClientSecret();
  const verifier     = store.get('pkce_verifier');
  const redirectUri  = store.get('pkce_redirect') || location.href.split('?')[0];

  const res = await fetch(TOKEN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     clientId,
      client_secret: clientSecret,
      code,
      code_verifier: verifier,
      grant_type:    'authorization_code',
      redirect_uri:  redirectUri,
    }),
  });

  const data = await res.json();
  if (data.error) throw new Error(data.error_description || data.error);

  store.set('accessToken',  data.access_token);
  store.set('tokenExpiry',  Date.now() + (data.expires_in - 60) * 1000);
  if (data.refresh_token) store.set('refreshToken', data.refresh_token);

  store.del('pkce_verifier');
  store.del('pkce_redirect');

  // Clean URL
  history.replaceState({}, '', location.pathname);
}

async function refreshAccessToken() {
  const clientId     = getClientId();
  const clientSecret = getClientSecret();
  const refreshToken = getRefreshToken();
  if (!clientId || !refreshToken) throw new Error('No credentials');

  const res = await fetch(TOKEN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     clientId,
      client_secret: clientSecret,
      refresh_token: refreshToken,
      grant_type:    'refresh_token',
    }),
  });

  const data = await res.json();
  if (data.error) throw new Error(data.error_description || data.error);

  store.set('accessToken', data.access_token);
  store.set('tokenExpiry', Date.now() + (data.expires_in - 60) * 1000);
  return data.access_token;
}

async function getValidToken() {
  if (Date.now() < getTokenExpiry()) return getAccessToken();
  return refreshAccessToken();
}

// ─────────────────────────────────────────────
// TASKS API
// ─────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const token = await getValidToken();
  const res = await fetch(`${TASKS_BASE}${path}`, {
    ...opts,
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

async function fetchLists() {
  const data = await apiFetch('/users/@me/lists');
  return data.items || [];
}

async function addTask(title, dueDate, listId) {
  const body = { title };
  if (dueDate) body.due = new Date(dueDate + 'T00:00:00').toISOString();
  return apiFetch(`/lists/${listId}/tasks`, {
    method: 'POST',
    body: JSON.stringify(body),
  });
}

// ─────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────
const authScreen   = document.getElementById('auth-screen');
const configScreen = document.getElementById('config-screen');
const appScreen    = document.getElementById('app-screen');
const taskInput    = document.getElementById('task-input');
const sendBtn      = document.getElementById('send-btn');
const toast        = document.getElementById('toast');
const listSelector = document.getElementById('list-selector');
const dueDateInput = document.getElementById('due-date');

function show(el) {
  [authScreen, configScreen, appScreen].forEach(s => s.style.display = 'none');
  el.style.display = 'flex';
}

let toastTimer;
function showToast(msg, type = '') {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = `show ${type}`;
  toastTimer = setTimeout(() => { toast.className = ''; }, 2200);
}

// Auto-resize textarea
taskInput.addEventListener('input', () => {
  taskInput.style.height = 'auto';
  taskInput.style.height = taskInput.scrollHeight + 'px';
  sendBtn.disabled = !taskInput.value.trim();
});

// Send on Enter (not shift+enter)
taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTask(); }
});

sendBtn.addEventListener('click', sendTask);

async function sendTask() {
  const title = taskInput.value.trim();
  if (!title) return;

  sendBtn.disabled = true;
  sendBtn.classList.add('loading');

  try {
    const listId = listSelector.value || '@default';
    await addTask(title, dueDateInput.value, listId);
    saveListId(listId);
    taskInput.value = '';
    taskInput.style.height = 'auto';
    dueDateInput.value = '';
    showToast('Added ✓', 'ok');
    taskInput.focus();
  } catch (err) {
    showToast(err.message || 'Failed', 'err');
    sendBtn.disabled = false;
  } finally {
    sendBtn.classList.remove('loading');
  }
}

// List selector
listSelector.addEventListener('change', () => saveListId(listSelector.value));

async function populateLists() {
  try {
    const lists = await fetchLists();
    listSelector.innerHTML = '';
    const savedId = getListId();
    lists.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l.id;
      opt.textContent = l.title;
      if (l.id === savedId) opt.selected = true;
      listSelector.appendChild(opt);
    });
  } catch {
    listSelector.innerHTML = '<option value="@default">My Tasks</option>';
  }
}

// Setup button
document.getElementById('setup-btn').addEventListener('click', () => show(configScreen));

document.getElementById('config-cancel-btn').addEventListener('click', () => {
  show(getRefreshToken() ? appScreen : authScreen);
});

document.getElementById('config-save-btn').addEventListener('click', async () => {
  const id     = document.getElementById('client-id-input').value.trim();
  const secret = document.getElementById('client-secret-input').value.trim();
  if (!id || !secret) return;
  await startAuth(id, secret);
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
async function init() {
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // Handle OAuth callback
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    showToast('Auth cancelled', 'err');
    history.replaceState({}, '', location.pathname);
  }

  if (code) {
    try {
      await handleAuthCallback(code);
    } catch (err) {
      showToast('Auth failed: ' + err.message, 'err');
    }
  }

  // Decide which screen
  if (getRefreshToken()) {
    show(appScreen);
    populateLists();
    focusInput();
  } else {
    show(authScreen);
  }
}

// Robust focus: rAF for next paint, plus a delayed retry.
// Android TWA / WebView often ignores focus() called too early.
function focusInput() {
  requestAnimationFrame(() => {
    taskInput.focus();
    // Retry after layout settles — second attempt catches WebView edge cases
    setTimeout(() => taskInput.focus(), 150);
  });
}

// Re-focus when app returns from background
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && appScreen.style.display !== 'none') {
    focusInput();
  }
});

init();
</script>
</body>
</html>
